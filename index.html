```html
<!DOCTYPE html>
<html>

<head>
<title>My Profile Page</title>

<style>

body {
  background-color: #f5f5f5;
  font-family: Arial, sans-serif;
}

#main-profile {
  width: 320px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
  transition: 0.3s;
}

.card {
  background: white;
}

.text-center {
  text-align: center;
}

.highlight {
  color: #007bff;
  font-weight: bold;
}

.img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  transition: 0.3s;
}

.name {
  color: #333;
  transition: 0.3s;
}

.bio {
  color: #666;
  font-size: 14px;
}

.link {
  text-decoration: none;
  background: #007bff;
  color: white;
  padding: 10px;
  border-radius: 5px;
  display: inline-block;
  transition: 0.3s;
}

.img:hover {
  transform: scale(1.1);
}

.name:hover {
  color: #007bff;
}

.link:hover {
  transform: scale(1.05);
  background-color: #0056b3;
}

#main-profile:hover {
  transform: translateY(-5px);
}

</style>

</head>

<body>

<div id="main-profile" class="card text-center">

<img src="https://i.imgur.com/ZtbcdUY.png"
     alt="My picture"
     class="img"
     title="This is me"
     width="150"
     style="border: 3px solid #007bff;" />

<br><br>

<h1 class="name highlight" style="font-size: 28px;">
  I Am Felicia Ogechi
</h1>

<p class="bio">
I am a Business Administration student with interest in customer service, sales, and web development.
</p>

<br>

<a href="https://instagram.com"
   class="link"
   title="My Instagram">
   My Instagram
</a>

<br><br>

<hr />

</div>

</body>
</html>
```
